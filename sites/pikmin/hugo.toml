baseURL = "https://pikmin.lwstudio.org/"
locale = "zh-tw"
defaultContentLanguage = "zh-tw"
title = "Pikmin Days"
hasCJKLanguage = true

[pagination]
  pagerSize = 24

[module]
  [[module.imports]]
    path = "github.com/CaiJimmy/hugo-theme-stack/v3"

[params]
  mainSections = ["posts"]
  favicon = ""
  description = "用 Pikmin Bloom 走過的每一天"

  [params.sidebar]
    emoji = "🌱"
    subtitle = "走路、種花、收 Pikmin"

    [params.sidebar.avatar]
      enabled = false

  [params.article]
    math = false
    toc = false
    readingTime = false

    [params.article.license]
      enabled = false

  [[params.widgets.homepage]]
    type = "search"
  [[params.widgets.homepage]]
    type = "archives"

  [params.colorScheme]
    toggle = true
    default = "light"

[taxonomies]
  tag = "tags"
  category = "categories"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首頁"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "tags"
    name = "標籤"
    url = "/tags/"
    weight = 2

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
