baseURL = "https://draftzero.lwstudio.org/"
languageCode = "zh-tw"
defaultContentLanguage = "zh-tw"
title = "Draft Zero"
hasCJKLanguage = true
paginate = 20

[module]
  [[module.imports]]
    path = "github.com/CaiJimmy/hugo-theme-stack/v3"

[params]
  mainSections = ["posts"]
  favicon = ""
  description = "人生的初稿 · 2006–2009"

  [params.sidebar]
    emoji = ""
    subtitle = "2006–2009"
    compact = true

    [params.sidebar.avatar]
      enabled = false

  [params.article]
    math = false
    toc = false
    readingTime = false

    [params.article.license]
      enabled = false

  [[params.widgets.homepage]]
    type = "search"
  [[params.widgets.homepage]]
    type = "archives"

  [params.colorScheme]
    toggle = true
    default = "light"

[taxonomies]
  tag = "tags"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首頁"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "tags"
    name = "標籤"
    url = "/tags/"
    weight = 2

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
