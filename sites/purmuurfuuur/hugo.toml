baseURL = "https://purmuurfuuur.pages.dev/"
languageCode = "zh-tw"
defaultContentLanguage = "zh-tw"
title = "PurMuurFuuur"
hasCJKLanguage = true
paginate = 20

[module]
  [[module.imports]]
    path = "github.com/CaiJimmy/hugo-theme-stack/v3"

[params]
  mainSections = ["posts"]
  favicon = ""
  description = "生活記事"

  [params.sidebar]
    emoji = ""
    subtitle = "日常"

    [params.sidebar.avatar]
      enabled = false

  [params.article]
    math = false
    toc = false
    readingTime = false

    [params.article.license]
      enabled = false

  [[params.widgets.homepage]]
    type = "search"
  [[params.widgets.homepage]]
    type = "archives"
  [[params.widgets.homepage]]
    type = "tag-cloud"
  [[params.widgets.page]]
    type = "toc"

  [params.colorScheme]
    toggle = true
    default = "light"

[taxonomies]
  tag = "tags"
  category = "categories"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首頁"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "archives"
    name = "歸檔"
    url = "/archives/"
    weight = 2
  [[menu.main]]
    identifier = "search"
    name = "搜尋"
    url = "/search/"
    weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
