baseURL = "https://tempo.pages.dev/"
languageCode = "zh-tw"
defaultContentLanguage = "zh-tw"
title = "天頗的故事"
paginate = 100

[module]
  [[module.imports]]
    path = "github.com/nunocoracao/blowfish/v2"

[languages]
  [languages.zh-tw]
    languageName = "中文"
    weight = 1

disableLanguages = ["en"]

[params]
  colorScheme = "tempo"
  defaultAppearance = "light"
  autoSwitchAppearance = true
  enableSearch = false
  favicon = "favicon.svg"
  showLanguageSwitcher = false
  mainSections = ["posts"]

  [params.homepage]
    layout = "card"
    homepageImage = ""
    showRecent = true
    showRecentItems = 100
    cardView = true
    cardViewScreenWidth = false
    layoutBackgroundBlur = true

  [params.article]
    showDate = true
    showAuthor = false
    showBreadcrumbs = false
    showTableOfContents = false
    showTaxonomies = true

  [params.author]
    name = "Ravi Wu"

[taxonomies]
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
